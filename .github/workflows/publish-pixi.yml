name: Publish (pixi, from tag)
on:
  push:
    tags:
      - '*@*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        type: choice
        options:
          - septentrio_gnss_driver
      version:
        description: 'Version (blank = most recent <package>@* tag)'
        type: string
        default: ''
      sha:
        description: 'Commit SHA (blank = sha of the resolved tag)'
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve package/version/sha
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ref="${GITHUB_REF_NAME}"
            package="${ref%@*}"
            version="${ref##*@}"
            sha="${GITHUB_SHA}"
          else
            package="${{ inputs.package }}"
            version="${{ inputs.version }}"
            sha="${{ inputs.sha }}"
            # Fall back to the most recent tag of shape <package>@* when version
            # or sha weren't given on manual dispatch.
            if [ -z "$version" ] || [ -z "$sha" ]; then
              tag="$(git tag --list "${package}@*" --sort=-version:refname | head -n 1)"
              if [ -z "$tag" ]; then
                echo "::error::no tag matching ${package}@* found"; exit 1
              fi
              echo "Resolved most-recent tag for ${package}: ${tag}"
              [ -z "$version" ] && version="${tag##*@}"
              [ -z "$sha" ] && sha="$(git rev-list -n 1 "$tag")"
            fi
          fi
          echo "package=${package}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
      - uses: greenroom-robotics/mise/.github/actions/setup@v4
        id: setup
        with:
          gh-app-id: ${{ secrets.GH_APP_ID }}
          gh-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # Build gate: a recipe that doesn't build breaks every release once it
      # lands in ros-recipes, so prove the package builds before publishing.
      - name: Build package
        shell: bash
        run: |
          pixi run mise ci build \
            --package="${{ steps.resolve.outputs.package }}" \
            --package-dir=.
      - name: Publish recipe PR to ros-recipes
        shell: bash
        env:
          GH_TOKEN: ${{ steps.setup.outputs.gh-token }}
          GITHUB_TOKEN: ${{ steps.setup.outputs.gh-token }}
          API_TOKEN_GITHUB: ${{ steps.setup.outputs.gh-token }}
        run: |
          pixi run mise ci recipes-pr \
            --version="${{ steps.resolve.outputs.version }}" \
            --package="${{ steps.resolve.outputs.package }}" \
            --sha="${{ steps.resolve.outputs.sha }}" \
            --package-dir=. \
            --ros-distro=kilted \
            --recipes-repo=greenroom-robotics/ros-recipes
      - if: always()
        uses: greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v3
