name: Tag & Release
on:
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: 'If not specified, all packages will be released.'
        options:
          - ""
          - septentrio_gnss_driver
      build_kilted:
        type: boolean
        default: true
        description: "Release for Kilted"
      build_jazzy:
        type: boolean
        default: true
        description: "Release for Jazzy"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  deb:
    uses: Greenroom-Robotics/ros_semantic_release_action/.github/workflows/release.yml@main
    with:
      package: ${{ inputs.package }}
      package_dir: .
      build_kilted: ${{ inputs.build_kilted }}
      build_jazzy: ${{ inputs.build_jazzy }}
      changelog: false
      skip_tag: false
    secrets:
      token: ${{ secrets.API_TOKEN_GITHUB }}

  pixi:
    needs: deb
    runs-on: 2vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: greenroom-robotics/mise/.github/actions/recipes-pr@v4
        with:
          dispatch-sha: ${{ github.sha }}
          package: ${{ inputs.package }}
          ros-distro: kilted
          gh-app-client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          gh-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
