[workspace]
name = "septentrio_gnss_driver"
channels = [
  "http://localhost:12222/general",
  "https://prefix.dev/robostack-kilted",
  "https://prefix.dev/conda-forge",
]
platforms = ["linux-64", "linux-aarch64"]
preview = ["pixi-build"]

[dependencies]
ros-kilted-desktop = "*"
septentrio_gnss_driver = { path = "." }
mise                   = "*"

[package]
name        = "septentrio_gnss_driver"
version     = "1.5.4"
description = "ROSaic: C++ driver for Septentrio's GNSS and INS receivers"
license     = "BSD-3-Clause"
authors     = ["Greenroom Robotics <software-team@greenroomrobotics.com>"]

[package.build.backend]
name    = "pixi-build-ros-gr"
version = ">=0.4,<0.5"

# build-type = ament_idl: this package both generates interfaces AND builds a
# node/library. ament_idl uses the same build flow as ament_cmake (full cmake
# configure/build) but the synthesized package.xml carries the
# <member_of_group>rosidl_interface_packages</member_of_group> that
# rosidl_generate_interfaces() hard-requires.
[package.build.config]
mode         = "pixi-native"
build-type   = "ament_idl"
distro       = "kilted"
build-number = 1

[package.host-dependencies]
ros-kilted-ament-cmake               = "*"
ros-kilted-ament-cmake-gtest         = "*"
ros-kilted-rclcpp                    = "*"
ros-kilted-rclcpp-components         = "*"
ros-kilted-rosidl-default-generators = "*"
ros-kilted-diagnostic-msgs           = "*"
ros-kilted-diagnostic-updater        = "*"
ros-kilted-nmea-msgs                 = "*"
ros-kilted-sensor-msgs               = "*"
ros-kilted-geometry-msgs             = "*"
ros-kilted-geographic-msgs           = "*"
ros-kilted-gps-msgs                  = "*"
ros-kilted-nav-msgs                  = "*"
ros-kilted-tf2                       = "*"
ros-kilted-tf2-eigen                 = "*"
ros-kilted-tf2-geometry-msgs         = "*"
ros-kilted-tf2-ros                   = "*"
ros-kilted-std-msgs                  = "*"
libboost-devel                       = "*"
libpcap                              = "*"
geographiclib-cpp                    = "*"

[package.run-dependencies]
ros-kilted-rclcpp                 = "*"
ros-kilted-rclcpp-components      = "*"
ros-kilted-rosidl-default-runtime = "*"
ros-kilted-diagnostic-msgs        = "*"
ros-kilted-diagnostic-updater     = "*"
ros-kilted-nmea-msgs              = "*"
ros-kilted-sensor-msgs            = "*"
ros-kilted-geometry-msgs          = "*"
ros-kilted-geographic-msgs        = "*"
ros-kilted-gps-msgs               = "*"
ros-kilted-nav-msgs               = "*"
ros-kilted-tf2                    = "*"
ros-kilted-tf2-eigen              = "*"
ros-kilted-tf2-geometry-msgs      = "*"
ros-kilted-tf2-ros                = "*"
libboost                          = "*"
libpcap                           = "*"
geographiclib-cpp                 = "*"

# Build-only tools the run-closure (pulled in via the default feature's path
# dependency) doesn't provide. Everything else — ament-cmake, the rosidl stack,
# the message packages — comes transitively, so it isn't re-listed here.
[feature.dev.dependencies]
colcon-common-extensions              = "*"
cxx-compiler                          = "*"
make                                  = "*"
pkg-config                            = "*"
ros-kilted-rosidl-default-generators  = "*"

[feature.dev.tasks]
build = "colcon build"

# Tests extend dev: same build env, plus lint tooling and the test task.
[feature.tests.dependencies]
ros-kilted-ament-lint-auto = "*"

# `test` runs build -> colcon-test -> test-result as a dependency chain. A
# failing step stops the chain and fails the task, so a build break or a test
# failure both surface — no exit codes to juggle.
[feature.tests.tasks.colcon-test]
cmd        = "LD_PRELOAD=$CONDA_PREFIX/lib/libpython3.so colcon test --event-handlers console_direct+"
depends-on = ["build"]

[feature.tests.tasks.test]
cmd        = "colcon test-result --all --verbose"
depends-on = ["colcon-test"]

[environments]
dev   = { features = ["dev"] }
tests = { features = ["dev", "tests"] }
